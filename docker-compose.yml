services:
  postgres:
    image: postgres:16-alpine
    container_name: metaverse-db
    environment:
      POSTGRES_USER: metaverse
      POSTGRES_PASSWORD: metaverse
      POSTGRES_DB: metaverse
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
